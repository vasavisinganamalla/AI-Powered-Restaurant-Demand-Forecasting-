<!DOCTYPE html>
<html>
<head>
  <title>Restaurant Analytics</title>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>

  <div class="dashboard">

    <!-- Left Panel -->
    <div class="panel">
      <h2>Analytics Summary</h2>

      <p><b>Total Top Items:</b> {{ total_items }}</p>
      <p><b>Average Demand:</b> {{ avg_demand }} Orders</p>

      <hr style="opacity:0.3; margin:20px 0;">

      <p><b>Festival Demand:</b> {{ festival }} Orders</p>
      <p><b>Normal Demand:</b> {{ normal }} Orders</p>
    </div>

    <!-- Right Panel -->
    <div class="panel">
      <h2>Top Items Demand Chart</h2>

      <img src="/static/{{ chart }}" class="graph">

      <p style="opacity:0.8;">
        This chart highlights the most demanded dishes.
      </p>
    </div>

  </div>

  <!-- ✅ Bottom Center Button -->
  <div class="bottom-action">
    <a href="/" class="btn">Back to Home</a>
  </div>

</body>
</html>
